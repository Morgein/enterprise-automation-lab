---
name: Terraform Validation

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-validation.yml"

  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-validation.yml"

  workflow_dispatch:

jobs:
  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest

    env:
      TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform

      - name: Terraform init basics
        working-directory: terraform/azure/basics
        run: terraform init -backend=false -input=false

      - name: Terraform validate basics
        working-directory: terraform/azure/basics
        run: terraform validate

      - name: Terraform init dev environment
        working-directory: terraform/azure/environments/dev
        run: terraform init -backend=false -input=false

      - name: Terraform validate dev environment
        working-directory: terraform/azure/environments/dev
        run: terraform validate

      - name: Terraform init test environment
        working-directory: terraform/azure/environments/test
        run: terraform init -backend=false -input=false

      - name: Terraform validate test environment
        working-directory: terraform/azure/environments/test
        run: terraform validate

      - name: Terraform init remote state bootstrap
        working-directory: terraform/azure/bootstrap/remote-state
        run: terraform init -backend=false -input=false

      - name: Terraform validate remote state bootstrap
        working-directory: terraform/azure/bootstrap/remote-state
        run: terraform validate
