---
name: Ansible Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ansible-validation:
    name: Validate Ansible Code
    runs-on: ubuntu-latest

    env:
      ANSIBLE_COLLECTIONS_PATH: ./collections

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml -p ./collections --force

      - name: Show tool versions
        run: |
          python --version
          ansible --version
          ansible-lint --version
          yamllint --version

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint .

      - name: Syntax check bootstrap playbook
        working-directory: ansible
        run: ansible-playbook playbooks/01-bootstrap-linux.yml --syntax-check

      - name: Syntax check Linux baseline playbook
        working-directory: ansible
        run: ansible-playbook playbooks/02-apply-linux-baseline.yml --syntax-check

      - name: Syntax check Nginx deployment playbook
        working-directory: ansible
        run: ansible-playbook playbooks/03-deploy-nginx.yml --syntax-check

      - name: Syntax check PostgreSQL deployment playbook
        working-directory: ansible
        run: ansible-playbook playbooks/04-deploy-postgresql.yml --syntax-check

      - name: Syntax check Node Exporter deployment playbook
        working-directory: ansible
        run: ansible-playbook playbooks/05-deploy-node-exporter.yml --syntax-check

      - name: Syntax check Prometheus deployment playbook
        working-directory: ansible
        run: ansible-playbook playbooks/06-deploy-prometheus.yml --syntax-check

      - name: Syntax check Grafana deployment playbook
        working-directory: ansible
        run: ansible-playbook playbooks/07-deploy-grafana.yml --syntax-check

      - name: Syntax check site playbook
        working-directory: ansible
        run: ansible-playbook playbooks/site.yml --syntax-check

      - name: Syntax check site playbook with dev inventory
        working-directory: ansible
        run: ansible-playbook -i inventories/dev/hosts.ini playbooks/site.yml --syntax-check

      - name: Syntax check site playbook with prod inventory
        working-directory: ansible
        run: ansible-playbook -i inventories/prod/hosts.ini playbooks/site.yml --syntax-check
