---
- name: Validate Linux monitoring agents
  hosts: linux
  become: true
  gather_facts: false
  tags:
    - post_validation
    - validation
    - monitoring
    - stage_03

  pre_tasks:
    - name: Show Linux validation target
      ansible.builtin.debug:
        msg: "Validating Linux monitoring agent on {{ inventory_hostname }}"

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Validate Node Exporter service state
      ansible.builtin.assert:
        that:
          - "ansible_facts.services['node_exporter.service'].state == 'running'"
          - "ansible_facts.services['node_exporter.service'].status == 'enabled'"
        success_msg: "Node Exporter is running and enabled"
        fail_msg: "Node Exporter is not running or not enabled"

    - name: Validate Node Exporter local metrics endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:9100/metrics
        status_code: 200
        return_content: false
      changed_when: false

  post_tasks:
    - name: Show Linux monitoring validation completion
      ansible.builtin.debug:
        msg: "Linux monitoring validation completed for {{ inventory_hostname }}"

- name: Validate web layer
  hosts: web
  become: false
  gather_facts: false
  tags:
    - post_validation
    - validation
    - web
    - nginx
    - stage_03

  pre_tasks:
    - name: Show web validation target
      ansible.builtin.debug:
        msg: "Validating web layer on {{ inventory_hostname }}"

  tasks:
    - name: Validate Nginx local HTTP response
      ansible.builtin.uri:
        url: http://127.0.0.1
        status_code: 200
        return_content: true
      register: nginx_validation_result
      changed_when: false

    - name: Validate Nginx page content
      ansible.builtin.assert:
        that:
          - "'Enterprise Automation Lab' in nginx_validation_result.content"
        success_msg: "Nginx page contains expected lab content"
        fail_msg: "Nginx page does not contain expected lab content"

  post_tasks:
    - name: Show web validation completion
      ansible.builtin.debug:
        msg: "Web validation completed for {{ inventory_hostname }}"

- name: Validate database layer
  hosts: database
  become: true
  gather_facts: false
  tags:
    - post_validation
    - validation
    - database
    - postgresql
    - stage_03

  pre_tasks:
    - name: Show database validation target
      ansible.builtin.debug:
        msg: "Validating database layer on {{ inventory_hostname }}"

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Validate PostgreSQL service unit is enabled
      ansible.builtin.assert:
        that:
          - "'postgresql.service' in ansible_facts.services"
          - "ansible_facts.services['postgresql.service'].status == 'enabled'"
        success_msg: "PostgreSQL service unit is enabled"
        fail_msg: "PostgreSQL service unit is not enabled"

    - name: Validate PostgreSQL database query
      community.postgresql.postgresql_query:
        login_db: postgres
        query: "SELECT datname FROM pg_database WHERE datname='automation_lab';"
      become: true
      become_user: postgres
      register: postgresql_validation_result
      changed_when: false

    - name: Validate automation_lab database exists
      ansible.builtin.assert:
        that:
          - >-
            postgresql_validation_result.query_result
            | selectattr('datname', 'equalto', 'automation_lab')
            | list
            | length > 0
        success_msg: "automation_lab database exists and PostgreSQL accepts queries"
        fail_msg: "automation_lab database was not found"

  post_tasks:
    - name: Show database validation completion
      ansible.builtin.debug:
        msg: "Database validation completed for {{ inventory_hostname }}"

- name: Validate monitoring server
  hosts: monitoring
  become: true
  gather_facts: false
  tags:
    - post_validation
    - validation
    - monitoring
    - prometheus
    - grafana
    - stage_03

  pre_tasks:
    - name: Show monitoring validation target
      ansible.builtin.debug:
        msg: "Validating monitoring server on {{ inventory_hostname }}"

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Validate Prometheus service state
      ansible.builtin.assert:
        that:
          - "ansible_facts.services['prometheus.service'].state == 'running'"
          - "ansible_facts.services['prometheus.service'].status == 'enabled'"
        success_msg: "Prometheus is running and enabled"
        fail_msg: "Prometheus is not running or not enabled"

    - name: Validate Grafana service state
      ansible.builtin.assert:
        that:
          - "ansible_facts.services['grafana-server.service'].state == 'running'"
          - "ansible_facts.services['grafana-server.service'].status == 'enabled'"
        success_msg: "Grafana is running and enabled"
        fail_msg: "Grafana is not running or not enabled"

    - name: Validate Prometheus readiness endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:9090/-/ready
        status_code: 200
        return_content: true
      register: prometheus_ready_result
      changed_when: false

    - name: Validate Prometheus readiness content
      ansible.builtin.assert:
        that:
          - "'Prometheus Server is Ready' in prometheus_ready_result.content"
        success_msg: "Prometheus readiness endpoint is healthy"
        fail_msg: "Prometheus readiness endpoint did not return expected content"

    - name: Validate Grafana health endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:3000/api/health
        status_code: 200
        return_content: true
      register: grafana_health_result
      changed_when: false

    - name: Validate Grafana database health
      ansible.builtin.assert:
        that:
          - grafana_health_result.json.database == "ok"
        success_msg: "Grafana database health is ok"
        fail_msg: "Grafana database health is not ok"

  post_tasks:
    - name: Show monitoring validation completion
      ansible.builtin.debug:
        msg: "Monitoring validation completed for {{ inventory_hostname }}"
